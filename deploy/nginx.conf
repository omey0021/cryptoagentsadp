upstream cryptoagentsadp_backend {
  server 127.0.0.1:5000;
  keepalive 64;
}

server {
  listen 80;
  server_name cryptoagentsadp.xyz www.cryptoagentsadp.xyz;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl http2;
  server_name cryptoagentsadp.xyz www.cryptoagentsadp.xyz;

  ssl_certificate     /etc/letsencrypt/live/cryptoagentsadp.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cryptoagentsadp.xyz/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.coingecko.com; frame-ancestors 'none';" always;

  root /var/www/cryptoagentsadp/public;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://cryptoagentsadp_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    etag on;
  }

  location ~* \.(json|xml)$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
  }

  location /nginx-status {
    stub_status on;
    access_log off;
    allow 127.0.0.1;
    deny all;
  }

  access_log /var/log/nginx/cryptoagentsadp-access.log;
  error_log  /var/log/nginx/cryptoagentsadp-error.log;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
  gzip_min_length 256;
  gzip_comp_level 6;
  gzip_vary on;
}